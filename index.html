<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bench Master - iPhone 12</title>
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --accent: #30d158;
            --blue: #0a84ff;
            --text-dim: #8e8e93;
            /* Support pour l'encoche (notch) de l'iPhone 12 */
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            padding: calc(var(--safe-top) + 20px) 20px calc(var(--safe-bottom) + 20px) 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* En-tête Date fixe en haut */
        header {
            text-align: left;
            margin-bottom: 30px;
            padding-left: 5px;
        }

        .today-label {
            color: var(--accent);
            text-transform: uppercase;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .current-date {
            font-size: 34px;
            font-weight: 800;
            margin-top: 2px;
            letter-spacing: -0.5px;
        }

        /* Carte Session - Largeur optimisée pour iPhone 12 */
        .session-card {
            background: var(--card);
            width: 100%;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 0.5px solid rgba(255,255,255,0.1);
            animation: cardAppear 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .goal-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .week-tag {
            background: rgba(10, 132, 255, 0.15);
            color: var(--blue);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
        }

        .goal-val {
            font-size: 17px;
            font-weight: 600;
        }

        /* Liste des exercices - Espacement vertical pour usage tactile */
        .workout-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ex-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 16px;
            border-radius: 16px;
        }

        .ex-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .ex-name {
            font-size: 17px;
            font-weight: 600;
            color: #ffffff;
        }

        .ex-reps {
            font-size: 14px;
            color: var(--text-dim);
        }

        .ex-weight {
            font-size: 20px;
            font-weight: 700;
            color: var(--blue);
        }

        /* État Repos */
        .rest-box {
            text-align: center;
            padding: 60px 20px;
        }

        .rest-icon {
            width: 64px;
            height: 64px;
            background: rgba(48, 209, 88, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
        }

        .next-info {
            color: var(--text-dim);
            font-size: 15px;
            margin-top: 10px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <header>
        <div class="today-label">Séance du jour</div>
        <div class="current-date" id="display-date">-- --</div>
    </header>

    <main id="app">
        </main>

<script>
    // Configuration en dur selon tes critères
    const START_DATE = new Date('2026-04-23');
    const BASE_GOAL = 120;
    
    const program = [
        { day: "Jeudi", workouts: [{t: "Classique", r: "1x3", p: 80}, {t: "Classique", r: "1x3", p: 82}, {t: "Classique", r: "1x3", p: 84}, {t: "Serrée", r: "1x8", p: 70}] },
        { day: "Vendredi", workouts: [{t: "2ct Pause", r: "1x5", p: 65}, {t: "2ct Pause", r: "1x5", p: 70}, {t: "2ct Pause", r: "1x5", p: 75}, {t: "Classique", r: "1x7", p: 65}] },
        { day: "Samedi", workouts: [{t: "Larsen", r: "1x7", p: 60}, {t: "Larsen", r: "2x7", p: 65}, {t: "Larsen", r: "1x7", p: 62}] },
        { day: "Dimanche", workouts: [{t: "Classique", r: "1x1", p: 80}, {t: "Classique", r: "1x1", p: 85}, {t: "Classique", r: "1x1", p: 89}, {t: "Classique", r: "1x7", p: 65}] }
    ];

    function render() {
        const now = new Date();
        const displayDate = now.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });
        document.getElementById('display-date').innerText = displayDate;

        const diffDays = Math.floor((now - START_DATE) / (1000 * 60 * 60 * 24));
        const weekIndex = Math.floor(diffDays / 7);
        const cycleIndex = Math.floor(weekIndex / 5);
        const currentGoal = BASE_GOAL + (cycleIndex * 2.5);
        const weekInCycle = (weekIndex % 5) + 1;

        const dayName = now.toLocaleDateString('fr-FR', { weekday: 'long' });
        const capitalizedDay = dayName.charAt(0).toUpperCase() + dayName.slice(1);
        const session = program.find(p => p.day === capitalizedDay);

        const app = document.getElementById('app');

        if (diffDays < 0 || !session) {
            // Trouver la prochaine séance
            let next = new Date(now);
            let nextStr = "";
            for(let i=1; i<=7; i++) {
                next.setDate(next.getDate() + 1);
                let d = next.toLocaleDateString('fr-FR', { weekday: 'long' });
                if(program.find(p => p.day === d.charAt(0).toUpperCase() + d.slice(1))) {
                    nextStr = next.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'short' });
                    break;
                }
            }

            app.innerHTML = `
                <div class="session-card">
                    <div class="rest-box">
                        <div class="rest-icon">🧘‍♂️</div>
                        <div style="font-size: 22px; font-weight: 700;">Repos</div>
                        <div class="next-info">Prochaine séance prévue le<br><strong>${nextStr}</strong></div>
                    </div>
                </div>`;
            return;
        }

        let html = `
            <div class="session-card">
                <div class="goal-bar">
                    <span class="week-tag">Semaine ${weekInCycle}</span>
                    <span class="goal-val">${currentGoal} kg</span>
                </div>
                <div class="workout-list">
        `;

        session.workouts.forEach(w => {
            const weight = Math.ceil((currentGoal * w.p / 100) / 2.5) * 2.5;
            html += `
                <div class="ex-row">
                    <div class="ex-info">
                        <span class="ex-name">${w.t}</span>
                        <span class="ex-reps">${w.r} @ ${w.p}%</span>
                    </div>
                    <div class="ex-weight">${weight}kg</div>
                </div>
            `;
        });

        html += `</div></div>`;
        app.innerHTML = html;
    }

    render();
</script>

</body>
</html>
