<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bench Master - Focus</title>
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --accent: #30d158; /* iOS Green */
            --blue: #0a84ff; /* iOS Blue */
            --orange: #ff9f0a; /* iOS Orange - pour le verso */
            --red: #ff453a;
            --text-dim: #8e8e93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-height: 100vh;
            max-width: 100vw;
        }

        /* En-tête Date */
        .header-date {
            text-align: center;
            margin-bottom: 30px;
        }

        .today-label {
            color: var(--accent);
            text-transform: uppercase;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .current-date {
            font-size: 32px;
            font-weight: 800;
            margin-top: 5px;
        }

        /* Conteneur Flip */
        .flip-container {
            width: 100%;
            max-width: 350px;
            perspective: 1500px;
            cursor: pointer;
        }

        .flipper {
            position: relative;
            width: 100%;
            transition: transform 0.7s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-container.flipped .flipper {
            transform: rotateY(180deg);
        }

        /* Carte de Séance */
        .session-card {
            background: var(--card);
            width: 100%;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            box-sizing: border-box;
        }

        .front {
            position: relative;
        }

        .back {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotateY(180deg);
        }

        .goal-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #3a3a3c;
        }

        .goal-text { font-size: 14px; color: var(--text-dim); font-weight: 500; }
.goal-val {
    font-size: 24px; /* Un peu plus grand pour mieux voir l'effet */
    font-weight: 800;
    
    /* Dégradé Bleu vers Violet */
    background: linear-gradient(135deg, #0a84ff, #bf5af2, #5e5ce6, #0a84ff);
    background-size: 300% 300%;
    
    /* Application du dégradé au texte */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-fill-color: transparent;
    
    /* Animation du dégradé */
    animation: glowGradient 4s ease infinite;
    
    /* Effet de lueur (glow) subtil */
    filter: drop-shadow(0 0 8px rgba(191, 90, 242, 0.3));
}

@keyframes glowGradient {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}
        

        /* Contenu Séance */
        .workout-list { display: flex; flex-direction: column; gap: 20px; }

        .ex-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ex-info { display: flex; flex-direction: column; }
        .ex-name { font-size: 17px; font-weight: 600; }
        .ex-reps { font-size: 14px; color: var(--text-dim); margin-top: 2px; }

        .ex-weight {
            font-size: 22px;
            font-weight: 700;
            color: white;
            background: rgba(255,255,255,0.05);
            padding: 8px 15px;
            border-radius: 12px;
            min-width: 80px;
            text-align: center;
        }

        /* État Repos */
        .rest-state {
            text-align: center;
            padding: 40px 0;
        }

        .rest-icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }

        .next-session {
            margin-top: 20px;
            font-size: 14px;
            color: var(--accent);
            font-weight: 600;
        }

    </style>
</head>
<body>

    <div class="header-date">
        <div class="today-label" id="day-label">Aujourd'hui</div>
        <div class="current-date" id="display-date">--/--</div>
    </div>

    <div id="flipContainer" class="flip-container">
        <div class="flipper">
            <div id="app" class="session-card front"></div>
            <div id="appBack" class="session-card back"></div>
        </div>
    </div>

<script>
    const START_DATE = new Date('2026-04-02'); // Date de référence (Jeudi = début S1)
    const BASE_GOAL = 120;
    const ALT_GOAL = 37.5; // Objectif alternatif (verso)

    // Programme sur 5 semaines, chaque semaine a ses propres % et reps
    const program = {
        1: {
            "Jeudi":    [{t: "Classique",   r: "1x3", p: 80}, {t: "Classique",   r: "1x3", p: 82}, {t: "Classique",   r: "1x3", p: 84}, {t: "Large/Serrée", r: "1x8", p: 70}, {t: "Large/Serrée", r: "1x8", p: 67}],
            "Vendredi": [{t: "2ct Pause",   r: "1x5", p: 65}, {t: "2ct Pause",   r: "1x5", p: 70}, {t: "2ct Pause",   r: "1x5", p: 75}, {t: "Classique",    r: "1x7", p: 65}],
            "Samedi":   [{t: "Larsen Press", r: "1x7", p: 60}, {t: "Larsen Press", r: "2x7", p: 65}, {t: "Larsen Press", r: "1x7", p: 62}],
            "Dimanche": [{t: "Classique",   r: "1x1", p: 80}, {t: "Classique",   r: "1x1", p: 85}, {t: "Classique",   r: "1x1", p: 89}, {t: "Classique",    r: "1x7", p: 65}]
        },
        2: {
            "Jeudi":    [{t: "Classique",   r: "1x3", p: 80}, {t: "Classique",   r: "1x3", p: 82}, {t: "Classique",   r: "1x3", p: 84}, {t: "Large/Serrée", r: "1x8", p: 70}, {t: "Large/Serrée", r: "1x8", p: 67}],
            "Vendredi": [{t: "2ct Pause",   r: "1x5", p: 65}, {t: "2ct Pause",   r: "1x5", p: 70}, {t: "2ct Pause",   r: "1x5", p: 75}, {t: "Classique",    r: "1x7", p: 65}],
            "Samedi":   [{t: "Larsen Press", r: "1x7", p: 60}, {t: "Larsen Press", r: "2x7", p: 65}, {t: "Larsen Press", r: "1x7", p: 62}],
            "Dimanche": [{t: "Classique",   r: "1x1", p: 85}, {t: "Classique",   r: "1x1", p: 89}, {t: "Classique",   r: "1x1", p: 92}, {t: "Classique",    r: "1x7", p: 65}]
        },
        3: {
            "Jeudi":    [{t: "Classique",   r: "1x3", p: 82}, {t: "Classique",   r: "1x3", p: 84}, {t: "Classique",   r: "1x3", p: 87}, {t: "Large/Serrée", r: "1x8", p: 70}, {t: "Large/Serrée", r: "1x8", p: 67}],
            "Vendredi": [{t: "2ct Pause",   r: "1x5", p: 65}, {t: "2ct Pause",   r: "1x5", p: 70}, {t: "2ct Pause",   r: "1x5", p: 75}, {t: "Classique",    r: "1x7", p: 65}],
            "Samedi":   [{t: "Larsen Press", r: "1x7", p: 60}, {t: "Larsen Press", r: "2x7", p: 65}, {t: "Larsen Press", r: "1x7", p: 62}],
            "Dimanche": [{t: "Classique",   r: "1x1", p: 89}, {t: "Classique",   r: "1x1", p: 92}, {t: "Classique",   r: "1x1", p: 95}, {t: "Classique",    r: "1x7", p: 65}]
        },
        4: {
            "Jeudi":    [{t: "Classique",   r: "1x3", p: 75}, {t: "Classique",   r: "1x3", p: 77}, {t: "Classique",   r: "1x3", p: 80}, {t: "Large/Serrée", r: "1x8", p: 67}, {t: "Large/Serrée", r: "1x8", p: 63}],
            "Vendredi": [{t: "2ct Pause",   r: "1x4", p: 65}, {t: "2ct Pause",   r: "1x4", p: 70}, {t: "2ct Pause",   r: "1x4", p: 75}, {t: "Classique",    r: "1x7", p: 65}],
            "Samedi":   [{t: "Larsen Press", r: "1x7", p: 60}, {t: "Larsen Press", r: "1x7", p: 65}, {t: "Larsen Press", r: "1x7", p: 62}],
            "Dimanche": [{t: "Classique",   r: "1x1", p: 90}, {t: "Classique",   r: "1x1", p: 95}, {t: "Classique",   r: "1x1", p: 100}, {t: "Classique",    r: "1x7", p: 65}]
        },
        5: {
            "Jeudi":    [{t: "Classique",   r: "1x5", p: 60}, {t: "Classique",   r: "1x5", p: 65}, {t: "Classique",   r: "1x5", p: 70}],
            "Vendredi": [{t: "2ct Pause",   r: "1x5", p: 60}, {t: "2ct Pause",   r: "1x5", p: 65}, {t: "Classique",   r: "1x5", p: 60}],
            "Samedi":   [{t: "Larsen Press", r: "1x6", p: 55}, {t: "Larsen Press", r: "1x6", p: 60}],
            "Dimanche": [{t: "Classique",   r: "1x3", p: 70}, {t: "Classique",   r: "1x3", p: 75}, {t: "Classique",   r: "1x5", p: 60}]
        }
    };

    const DAYS_FR = ["Dimanche", "Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi"];

    function getWorkoutData(targetDate) {
        const diffTime = targetDate - START_DATE;
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

        if (diffDays < 0) return null;

        const currentWeekIndex = Math.floor(diffDays / 7);
        const cycleIndex = Math.floor(currentWeekIndex / 5);
        const weekInCycle = (currentWeekIndex % 5) + 1;
        const currentGoal = BASE_GOAL + (cycleIndex * 2.5);

        const dayName = DAYS_FR[targetDate.getDay()];
        const weekProgram = program[weekInCycle];
        const workouts = weekProgram[dayName];
        const session = workouts ? { day: dayName, workouts } : null;

        return {
            session,
            week: weekInCycle,
            goal: currentGoal,
            dayName
        };
    }

    function findNextSession(startDate) {
        let next = new Date(startDate);
        for (let i = 1; i <= 7; i++) {
            next.setDate(next.getDate() + 1);
            const data = getWorkoutData(next);
            if (data && data.session) {
                return next.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
            }
        }
    }

    // Génère le HTML intérieur d'une carte pour un objectif donné
    function buildCardHTML(data, goal, isBack) {
        if (!data || !data.session) {
            return `
                <div class="rest-state">
                    <span class="rest-icon">🧘‍♂️</span>
                    <div style="font-size: 24px; font-weight: 700;">Repos</div>
                    <div class="next-session">Prochaine séance : <br>${findNextSession(new Date())}</div>
                </div>
            `;
        }

        let html = `
            <div class="goal-info">
                <div class="goal-text">Semaine ${data.week} • ${isBack ? 'Objectif Camille' : 'Objectif du cycle'}</div>
                <div class="goal-val">${goal} kg</div>
            </div>
            <div class="workout-list">
        `;

        data.session.workouts.forEach(w => {
            // Recto : arrondi au 2.5 supérieur (barre olympique)
            // Verso : arrondi au 0.5 supérieur (charges légères, plus de granularité)
            let weight;
            if (isBack) {
                weight = Math.ceil((goal * w.p / 100) / 2.5) * 2.5;
            } else {
                weight = Math.ceil((goal * w.p / 100) / 2.5) * 2.5;
            }
            html += `
                <div class="ex-row">
                    <div class="ex-info">
                        <span class="ex-name">${w.t}</span>
                        <span class="ex-reps">${w.r} à ${w.p}%</span>
                    </div>
                    <div class="ex-weight">${weight}</div>
                </div>
            `;
        });

        html += `</div>`;
        return html;
    }

    function render() {
        const now = new Date();
        const data = getWorkoutData(now);
        const app = document.getElementById('app');
        const appBack = document.getElementById('appBack');
        
        document.getElementById('display-date').innerText = now.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });

        // Recto : objectif principal (120 kg + progression cycle)
        app.innerHTML = buildCardHTML(data, data ? data.goal : null, false);
        // Verso : objectif 37.5 kg
        appBack.innerHTML = buildCardHTML(data, ALT_GOAL, true);
    }

    render();

    // Gestion du flip au clic
    const flipContainer = document.getElementById('flipContainer');
    flipContainer.addEventListener('click', () => {
        flipContainer.classList.toggle('flipped');
    });
</script>

</body>
</html>
