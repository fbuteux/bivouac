<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bench Master - Focus</title>
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --accent: #30d158; /* iOS Green */
            --blue: #0a84ff; /* iOS Blue */
            --red: #ff453a;
            --text-dim: #8e8e93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-height: 100vh;
            max-width: 100vw;
        }

        /* En-tête Date */
        .header-date {
            text-align: center;
            margin-bottom: 30px;
        }

        .today-label {
            color: var(--accent);
            text-transform: uppercase;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .current-date {
            font-size: 32px;
            font-weight: 800;
            margin-top: 5px;
        }

        /* Carte de Séance */
        .session-card {
            background: var(--card);
            width: 100%;
            max-width: 350px;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        .goal-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #3a3a3c;
        }

        .goal-text { font-size: 14px; color: var(--text-dim); font-weight: 500; }
        .goal-val { font-size: 20px; font-weight: 700; color: var(--blue); }

        /* Contenu Séance */
        .workout-list { display: flex; flex-direction: column; gap: 20px; }

        .ex-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ex-info { display: flex; flex-direction: column; }
        .ex-name { font-size: 17px; font-weight: 600; }
        .ex-reps { font-size: 14px; color: var(--text-dim); margin-top: 2px; }

        .ex-weight {
            font-size: 22px;
            font-weight: 700;
            color: white;
            background: rgba(255,255,255,0.05);
            padding: 8px 15px;
            border-radius: 12px;
            min-width: 80px;
            text-align: center;
        }

        /* État Repos */
        .rest-state {
            text-align: center;
            padding: 40px 0;
        }

        .rest-icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }

        .next-session {
            margin-top: 20px;
            font-size: 14px;
            color: var(--accent);
            font-weight: 600;
        }

    </style>
</head>
<body>

    <div class="header-date">
        <div class="today-label" id="day-label">Aujourd'hui</div>
        <div class="current-date" id="display-date">--/--</div>
    </div>

    <div id="app" class="session-card">
        </div>

<script>
    const START_DATE = new Date('2026-04-02'); // Date de référence (Jeudi = début S1)
    const BASE_GOAL = 120;

    // Programme sur 5 semaines, chaque semaine a ses propres % et reps
    // S1-S4 : progression ; S5 : deload (récupération après test max S4)
    const program = {
        // ========== SEMAINE 1 ==========
        1: {
            "Jeudi":    [{t: "Classique",   r: "1x3", p: 80}, {t: "Classique",   r: "1x3", p: 82}, {t: "Classique",   r: "1x3", p: 84}, {t: "Large/Serrée", r: "1x8", p: 70}, {t: "Large/Serrée", r: "1x8", p: 67}],
            "Vendredi": [{t: "2ct Pause",   r: "1x5", p: 65}, {t: "2ct Pause",   r: "1x5", p: 70}, {t: "2ct Pause",   r: "1x5", p: 75}, {t: "Classique",    r: "1x7", p: 65}],
            "Samedi":   [{t: "Larsen Press", r: "1x7", p: 60}, {t: "Larsen Press", r: "2x7", p: 65}, {t: "Larsen Press", r: "1x7", p: 62}],
            "Dimanche": [{t: "Classique",   r: "1x1", p: 80}, {t: "Classique",   r: "1x1", p: 85}, {t: "Classique",   r: "1x1", p: 89}, {t: "Classique",    r: "1x7", p: 65}]
        },
        // ========== SEMAINE 2 ==========
        2: {
            "Jeudi":    [{t: "Classique",   r: "1x3", p: 80}, {t: "Classique",   r: "1x3", p: 82}, {t: "Classique",   r: "1x3", p: 84}, {t: "Large/Serrée", r: "1x8", p: 70}, {t: "Large/Serrée", r: "1x8", p: 67}],
            "Vendredi": [{t: "2ct Pause",   r: "1x5", p: 65}, {t: "2ct Pause",   r: "1x5", p: 70}, {t: "2ct Pause",   r: "1x5", p: 75}, {t: "Classique",    r: "1x7", p: 65}],
            "Samedi":   [{t: "Larsen Press", r: "1x7", p: 60}, {t: "Larsen Press", r: "2x7", p: 65}, {t: "Larsen Press", r: "1x7", p: 62}],
            "Dimanche": [{t: "Classique",   r: "1x1", p: 85}, {t: "Classique",   r: "1x1", p: 89}, {t: "Classique",   r: "1x1", p: 92}, {t: "Classique",    r: "1x7", p: 65}]
        },
        // ========== SEMAINE 3 ==========
        3: {
            "Jeudi":    [{t: "Classique",   r: "1x3", p: 82}, {t: "Classique",   r: "1x3", p: 84}, {t: "Classique",   r: "1x3", p: 87}, {t: "Large/Serrée", r: "1x8", p: 70}, {t: "Large/Serrée", r: "1x8", p: 67}],
            "Vendredi": [{t: "2ct Pause",   r: "1x5", p: 65}, {t: "2ct Pause",   r: "1x5", p: 70}, {t: "2ct Pause",   r: "1x5", p: 75}, {t: "Classique",    r: "1x7", p: 65}],
            "Samedi":   [{t: "Larsen Press", r: "1x7", p: 60}, {t: "Larsen Press", r: "2x7", p: 65}, {t: "Larsen Press", r: "1x7", p: 62}],
            "Dimanche": [{t: "Classique",   r: "1x1", p: 89}, {t: "Classique",   r: "1x1", p: 92}, {t: "Classique",   r: "1x1", p: 95}, {t: "Classique",    r: "1x7", p: 65}]
        },
        // ========== SEMAINE 4 (PIC - TEST MAX) ==========
        4: {
            "Jeudi":    [{t: "Classique",   r: "1x3", p: 75}, {t: "Classique",   r: "1x3", p: 77}, {t: "Classique",   r: "1x3", p: 80}, {t: "Large/Serrée", r: "1x8", p: 67}, {t: "Large/Serrée", r: "1x8", p: 63}],
            "Vendredi": [{t: "2ct Pause",   r: "1x4", p: 65}, {t: "2ct Pause",   r: "1x4", p: 70}, {t: "2ct Pause",   r: "1x4", p: 75}, {t: "Classique",    r: "1x7", p: 65}],
            "Samedi":   [{t: "Larsen Press", r: "1x7", p: 60}, {t: "Larsen Press", r: "1x7", p: 65}, {t: "Larsen Press", r: "1x7", p: 62}],
            "Dimanche": [{t: "Classique",   r: "1x1", p: 90}, {t: "Classique",   r: "1x1", p: 95}, {t: "Classique",   r: "1x1", p: 100}, {t: "Classique",    r: "1x7", p: 65}]
        },
        // ========== SEMAINE 5 (DELOAD - RÉCUPÉRATION) ==========
        // Volume et intensité réduits après le test max de la S4.
        // Objectif : récupérer, pas progresser. ~60-70% avec moins de séries.
        5: {
            "Jeudi":    [{t: "Classique",   r: "1x5", p: 60}, {t: "Classique",   r: "1x5", p: 65}, {t: "Classique",   r: "1x5", p: 70}],
            "Vendredi": [{t: "2ct Pause",   r: "1x5", p: 60}, {t: "2ct Pause",   r: "1x5", p: 65}, {t: "Classique",   r: "1x5", p: 60}],
            "Samedi":   [{t: "Larsen Press", r: "1x6", p: 55}, {t: "Larsen Press", r: "1x6", p: 60}],
            "Dimanche": [{t: "Classique",   r: "1x3", p: 70}, {t: "Classique",   r: "1x3", p: 75}, {t: "Classique",   r: "1x5", p: 60}]
        }
    };

    const DAYS_FR = ["Dimanche", "Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi"];

    function getWorkoutData(targetDate) {
        const diffTime = targetDate - START_DATE;
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

        if (diffDays < 0) return null;

        const currentWeekIndex = Math.floor(diffDays / 7);
        const cycleIndex = Math.floor(currentWeekIndex / 5);
        const weekInCycle = (currentWeekIndex % 5) + 1; // 1 à 5
        const currentGoal = BASE_GOAL + (cycleIndex * 2.5);

        const dayName = DAYS_FR[targetDate.getDay()];

        // On récupère la séance du jour selon la semaine en cours
        const weekProgram = program[weekInCycle];
        const workouts = weekProgram[dayName];
        const session = workouts ? { day: dayName, workouts } : null;

        return {
            session,
            week: weekInCycle,
            goal: currentGoal,
            dayName
        };
    }

    function findNextSession(startDate) {
        let next = new Date(startDate);
        for (let i = 1; i <= 7; i++) {
            next.setDate(next.getDate() + 1);
            const data = getWorkoutData(next);
            if (data && data.session) {
                return next.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
            }
        }
    }

    function render() {
        const now = new Date(); // Utilise la date réelle du système
        const data = getWorkoutData(now);
        const app = document.getElementById('app');
        
        document.getElementById('display-date').innerText = now.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });

        if (!data || !data.session) {
            app.innerHTML = `
                <div class="rest-state">
                    <span class="rest-icon">🧘‍♂️</span>
                    <div style="font-size: 24px; font-weight: 700;">Repos</div>
                    <div class="next-session">Prochaine séance : <br>${findNextSession(now)}</div>
                </div>
            `;
            return;
        }

        let html = `
            <div class="goal-info">
                <div class="goal-text">Semaine ${data.week} • Cycle Objective</div>
                <div class="goal-val">${data.goal} kg</div>
            </div>
            <div class="workout-list">
        `;

        data.session.workouts.forEach(w => {
            const weight = Math.ceil((data.goal * w.p / 100) / 2.5) * 2.5;
            html += `
                <div class="ex-row">
                    <div class="ex-info">
                        <span class="ex-name">${w.t}</span>
                        <span class="ex-reps">${w.r} à ${w.p}%</span>
                    </div>
                    <div class="ex-weight">${weight}</div>
                </div>
            `;
        });

        html += `</div>`;
        app.innerHTML = html;
    }

    render();
</script>

</body>
</html>
