<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bench Master - Focus</title>
    <link rel="apple-touch-icon" href="01.png">
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --card-soft: #2c2c2e;
            --accent: #30d158; /* iOS Green */
            --blue: #0a84ff; /* iOS Blue */
            --orange: #ff9f0a; /* iOS Orange */
            --pink: #ff9f0a;
            --purple: #bf5af2;
            --yellow: #ffd60a;
            --red: #ff453a;
            --text-dim: #8e8e93;
            --text-soft: #aeaeb2;
            --divider: #3a3a3c;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            padding: 20px 12px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* En-tête Date */
        .header-date {
            text-align: center;
            margin-bottom: 24px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.2s ease;
        }

        .header-date:active {
            transform: scale(0.97);
        }

        .today-label {
            color: var(--accent);
            text-transform: uppercase;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1.2px;
            transition: color 0.3s ease;
        }

        .current-date {
            font-size: 30px;
            font-weight: 800;
            margin-top: 4px;
            text-transform: capitalize;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .current-date::after {
            content: '⌄';
            font-size: 20px;
            color: var(--text-dim);
            font-weight: 600;
            transform: translateY(-3px);
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .header-date.cal-open .current-date::after {
            transform: translateY(-3px) rotate(180deg);
        }

        /* Conteneur Flip */
        .flip-container {
            width: 100%;
            max-width: 380px;
            perspective: 1800px;
            cursor: pointer;
        }

        .flipper {
            position: relative;
            width: 100%;
            transition: transform 0.75s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-container.flipped .flipper {
            transform: rotateY(180deg);
        }

        /* Animation de swipe horizontal (jour précédent/suivant) */
        /* On anime le flip-container lui-même pour ne pas perturber le rotateY du flipper */
        .flip-container {
            transition: transform 0s, opacity 0s;
            will-change: transform;
        }

        .flip-container.swipe-anim {
            transition: transform 0.28s cubic-bezier(0.33, 1, 0.68, 1), opacity 0.28s ease;
        }

        .flip-container.swipe-out-left {
            transform: translateX(-110%);
            opacity: 0;
        }

        .flip-container.swipe-out-right {
            transform: translateX(110%);
            opacity: 0;
        }

        .flip-container.swipe-in-left {
            transform: translateX(110%);
            opacity: 0;
        }

        .flip-container.swipe-in-right {
            transform: translateX(-110%);
            opacity: 0;
        }

        /* Carte de Séance */
        .session-card {
            background: var(--card);
            width: 100%;
            border-radius: 28px;
            padding: 22px 20px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.06);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .front { position: relative; }

        .back {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotateY(180deg);
        }

        /* Bandeau objectif */
        .goal-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--divider);
        }

        .goal-text {
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 500;
            line-height: 1.35;
        }

        .goal-text strong {
            color: white;
            font-weight: 700;
        }

        .goal-val {
            font-size: 22px;
            font-weight: 800;

            background: linear-gradient(135deg, #0a84ff, #bf5af2, #5e5ce6, #0a84ff);
            background-size: 300% 300%;

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;

            animation: glowGradient 4s ease infinite;
            filter: drop-shadow(0 0 8px rgba(191, 90, 242, 0.3));

            white-space: nowrap;
        }

        /* Variante verso : dégradé orange/rose pour Camille */
        .back .goal-val {
            background: linear-gradient(135deg, #ff9f0a, #ff375f, #bf5af2, #ff9f0a);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            filter: drop-shadow(0 0 8px rgba(255, 159, 10, 0.35));
        }

        @keyframes glowGradient {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Liste des blocs exercices */
        .workout-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Bloc exercice (regroupe les séries d'un même mouvement) */
        .ex-block {
            background: var(--card-soft);
            border-radius: 16px;
            padding: 14px 14px 12px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .ex-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .ex-icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
        }

        .ex-icon.bench   { background: rgba(255, 69, 58, 0.18);  }   /* Rouge */
        .ex-icon.squat   { background: rgba(10, 132, 255, 0.18);  }  /* Bleu */
        .ex-icon.rowing  { background: rgba(48, 209, 88, 0.18);   }  /* Vert (dos) */
        .ex-icon.trac    { background: rgba(48, 209, 88, 0.18);   }  /* Vert (dos) */
        .ex-icon.dm      { background: rgba(255, 55, 95, 0.18);   }  /* Rose/orange */
        .ex-icon.course  { background: rgba(255, 255, 255, 0.12); }  /* Blanc */
        .ex-icon.abdos   { background: rgba(191, 90, 242, 0.20);  }  /* Violet */

        .ex-title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .ex-subtitle {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 1px;
        }

        /* Lignes de séries */
        .set-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .set-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 4px 6px 6px;
        }

        .set-row + .set-row {
            border-top: 1px solid rgba(255,255,255,0.04);
        }

        .set-info { display: flex; flex-direction: column; min-width: 0; }
        .set-name { font-size: 14px; font-weight: 600; color: white; }
        .set-reps { font-size: 12px; color: var(--text-dim); margin-top: 1px; }

        .set-weight {
            font-size: 16px;
            font-weight: 700;
            color: white;
            background: rgba(255,255,255,0.06);
            padding: 5px 12px;
            border-radius: 9px;
            min-width: 68px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        /* Mise en avant single ligne (course, abdos) */
        .single-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .single-line .value {
            font-size: 18px;
            font-weight: 700;
            color: white;
            background: rgba(255,255,255,0.06);
            padding: 5px 14px;
            border-radius: 9px;
            font-variant-numeric: tabular-nums;
        }

        /* Accent coloré par type sur le nombre */
        .ex-block.type-bench  .set-weight { color: #ff6b61; }   /* Rouge */
        .ex-block.type-squat  .set-weight { color: #5eb0ff; }   /* Bleu */
        .ex-block.type-rowing .set-weight { color: #5ee088; }   /* Vert */
        .ex-block.type-trac   .set-weight { color: #5ee088; }   /* Vert */
        .ex-block.type-dm     .set-weight { color: #ff6e8c; }   /* Rose */
        .ex-block.type-course .single-line .value { color: #ffffff; }   /* Blanc */
        .ex-block.type-abdos  .single-line .value { color: #d78cff; }   /* Violet */
        /* Tractions n'a qu'une single-line */
        .ex-block.type-trac   .single-line .value { color: #5ee088; }   /* Vert */

        /* État Repos */
        .rest-state {
            text-align: center;
            padding: 50px 0 40px;
        }

        .rest-icon {
            font-size: 52px;
            margin-bottom: 14px;
            display: block;
        }

        .rest-title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 0.3px;
        }

        .rest-sub {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 6px;
        }

        .next-session {
            margin-top: 22px;
            font-size: 13px;
            color: var(--accent);
            font-weight: 600;
            line-height: 1.5;
        }

        /* Hint flip */
        .flip-hint {
            margin-top: 14px;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 0.4px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .flip-hint .arrow {
            display: inline-block;
            animation: pulseArrow 2s ease-in-out infinite;
        }

        @keyframes pulseArrow {
            0%, 100% { opacity: 0.4; transform: translateX(0); }
            50%      { opacity: 1;   transform: translateX(3px); }
        }

        /* Badge Camille sur le verso */
        .persona-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 159, 10, 0.15);
            color: var(--orange);
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 6px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        /* Badge deload */
        .deload-chip {
            display: inline-block;
            background: rgba(255, 214, 10, 0.15);
            color: var(--yellow);
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 5px;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            margin-left: 6px;
            vertical-align: middle;
        }
        /* ====================================================================
           CALENDRIER
           Esprit Apple : sheet pleine largeur, transitions douces, pas de bordure
           ==================================================================== */

        /* Conteneur principal qui orchestre la transition carte ↔ calendrier */
        .stage {
            width: 100%;
            max-width: 380px;
            position: relative;
            min-height: 460px;
        }

        .stage > .flip-container,
        .stage > .calendar-view {
            transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Mode normal : carte visible, calendrier masqué */
        .stage:not(.cal-mode) .calendar-view {
            opacity: 0;
            transform: translateY(-10px) scale(0.98);
            pointer-events: none;
            position: absolute;
            inset: 0;
        }

        /* Mode calendrier : carte masquée, calendrier visible */
        .stage.cal-mode .flip-container {
            opacity: 0;
            transform: translateY(10px) scale(0.97);
            pointer-events: none;
            position: absolute;
            inset: 0;
        }
        .stage.cal-mode .calendar-view {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .calendar-view {
            width: 100%;
        }

        /* Sélecteur de mois (en haut, scrollable horizontalement) */
        .month-selector {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding: 4px 2px 14px;
            margin-bottom: 6px;
            scroll-snap-type: x mandatory;
        }
        .month-selector::-webkit-scrollbar { display: none; }

        .month-pill {
            flex-shrink: 0;
            padding: 8px 16px;
            background: var(--card);
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-soft);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.04);
            transition: all 0.25s ease;
            scroll-snap-align: center;
            white-space: nowrap;
            text-transform: capitalize;
            -webkit-tap-highlight-color: transparent;
        }

        .month-pill:active { transform: scale(0.95); }

        .month-pill.active {
            background: white;
            color: black;
            border-color: white;
            font-weight: 700;
        }

        /* Container scrollable des mois */
        .months-scroll {
            max-height: 70vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            scrollbar-width: none;
            padding: 0 2px 40px;
            mask-image: linear-gradient(to bottom, transparent 0, black 12px, black calc(100% - 28px), transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0, black 12px, black calc(100% - 28px), transparent 100%);
        }
        .months-scroll::-webkit-scrollbar { display: none; }

        .month-block {
            margin-bottom: 28px;
        }

        .month-title {
            font-size: 22px;
            font-weight: 800;
            margin: 4px 4px 14px;
            text-transform: capitalize;
            letter-spacing: -0.3px;
        }

        .month-title .year-tag {
            color: var(--text-dim);
            font-weight: 600;
            font-size: 18px;
            margin-left: 8px;
        }

        /* Grille jours */
        .weekday-row {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin: 0 0 8px;
        }

        .weekday-cell {
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .day-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }

        .day-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 12px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .day-cell.empty {
            cursor: default;
            pointer-events: none;
        }

        .day-cell:active:not(.empty) {
            transform: scale(0.92);
        }

        .day-cell:hover:not(.empty):not(.today) {
            background: rgba(255,255,255,0.04);
        }

        .day-num {
            font-size: 16px;
            font-weight: 600;
            color: white;
            line-height: 1;
        }

        /* Jour de repos : numéro plus discret */
        .day-cell.rest .day-num {
            color: var(--text-dim);
            font-weight: 500;
        }

        /* Conteneur de pastilles (jusqu'à 5 dots côte à côte) */
        .day-dots {
            display: flex;
            gap: 2px;
            margin-top: 4px;
            min-height: 5px;
            align-items: center;
            justify-content: center;
        }

        .day-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
            /* La pastille blanche prend une légère bordure pour être visible */
        }
        .day-dot.dot-course {
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15);
        }

        .day-cell.rest .day-dots {
            visibility: hidden;
        }

        /* Aujourd'hui : pastille blanche pleine */
        .day-cell.today {
            background: rgba(255,255,255,0.08);
        }

        .day-cell.today .day-num {
            color: var(--accent);
            font-weight: 800;
        }

        /* Jour sélectionné (différent d'aujourd'hui) */
        .day-cell.selected:not(.today) {
            background: rgba(10, 132, 255, 0.15);
        }
        .day-cell.selected:not(.today) .day-num {
            color: var(--blue);
            font-weight: 800;
        }

        /* Hors plage (avant un mois en arrière, après 12 mois) */
        .day-cell.out-of-range {
            opacity: 0.25;
            pointer-events: none;
        }

        /* Jours passés : pastilles plus foncées + numéro légèrement atténué */
        .day-cell.past .day-num {
            color: var(--text-soft);
            opacity: 0.6;
        }
        .day-cell.past.rest .day-num {
            opacity: 0.4;
        }
        .day-cell.past .day-dot {
            opacity: 0.45;
            filter: saturate(0.7);
        }

        /* Semaine de deload : fond léger jaune translucide sur toute la rangée */
        .day-cell.deload {
            background: rgba(255, 214, 10, 0.06);
        }
        /* Coins arrondis : on ne les coupe pas par cellule, on les laisse round */
        .day-cell.deload.today {
            background: rgba(255, 214, 10, 0.10);
        }
        /* Deload passé : fond plus foncé/désaturé */
        .day-cell.past.deload {
            background: rgba(255, 214, 10, 0.025);
        }

        /* Légende du programme Camille */
        .header-date.camille-mode .today-label {
            color: var(--orange);
        }
    </style>
</head>
<body>

    <div class="header-date" id="headerDate">
        <div class="today-label" id="day-label">Aujourd'hui</div>
        <div class="current-date" id="display-date">--/--</div>
    </div>

    <div id="stage" class="stage">
        <div id="flipContainer" class="flip-container">
            <div class="flipper">
                <div id="app" class="session-card front"></div>
                <div id="appBack" class="session-card back"></div>
            </div>
        </div>

        <div id="calendarView" class="calendar-view">
            <div id="monthSelector" class="month-selector"></div>
            <div id="monthsScroll" class="months-scroll"></div>
        </div>
    </div>


<script>
    // ========================================================================
    //  CONFIGURATION
    // ========================================================================
    const START_DATE = new Date(2026, 2, 28); // Jeudi 2 avril 2026 (heure locale) = début S1 du cycle

    // ── PREMIER JOUR DU BLOC (décalage des séances) ─────────────────────────
    // Décale TOUTES les séances de N jours plus TÔT sur le calendrier.
    // Les semaines et le deload NE bougent PAS (ancrés sur START_DATE).
    //   N = 2  →  jeudi devient mardi, vendredi devient mercredi (réglage actuel).
    //   N = 0  →  aucun décalage.   N = 1 → mercredi, N = 3 → lundi, etc.
    // Le 1er jour du bloc était jeudi ; passe N à 2 pour l'avoir le mardi.
    const DAY_SHIFT = 2;

    const BASE_GOAL = 120;      // Objectif bench principal (recto)
    const CAMILLE_GOAL = 37.5;  // Objectif bench Camille (verso)
    const CAMILLE_RATIO = CAMILLE_GOAL / BASE_GOAL; // 0.3125

    // Objectifs de base par exercice (recto)
    // Ces max servent de référence, les % s'appliquent dessus
    const MAX_REF = {
        bench: 120,
        squat: 125,    // Déduit du CSV : S4 1x1 100% = 125 kg
        dm:    45      // Déduit du CSV : S4 1x3 95% = 45 kg → 1RM ≈ 47.5 kg. On garde 45 comme charge cible 100% opérationnelle
    };

    // ========================================================================
    //  PROGRAMME BENCH (inchangé par rapport à l'existant)
    // ========================================================================
    const benchProgram = {
        1: {
            "Jeudi":    [{t: "Classique",   r: "1x3", p: 80}, {t: "Classique",   r: "1x3", p: 82}, {t: "Classique",   r: "1x3", p: 84}, {t: "Large/Serrée", r: "1x8", p: 70}, {t: "Large/Serrée", r: "1x8", p: 67}],
            "Vendredi": [{t: "2ct Pause",   r: "1x5", p: 65}, {t: "2ct Pause",   r: "1x5", p: 70}, {t: "2ct Pause",   r: "1x5", p: 75}, {t: "Classique",    r: "1x7", p: 65}],
            "Samedi":   [{t: "Larsen Press",r: "1x7", p: 60}, {t: "Larsen Press",r: "2x7", p: 65}, {t: "Larsen Press",r: "1x7", p: 62}],
            "Dimanche": [{t: "Classique",   r: "1x1", p: 80}, {t: "Classique",   r: "1x1", p: 85}, {t: "Classique",   r: "1x1", p: 89}, {t: "Classique",    r: "1x7", p: 65}]
        },
        2: {
            "Jeudi":    [{t: "Classique",   r: "1x3", p: 80}, {t: "Classique",   r: "1x3", p: 82}, {t: "Classique",   r: "1x3", p: 84}, {t: "Large/Serrée", r: "1x8", p: 70}, {t: "Large/Serrée", r: "1x8", p: 67}],
            "Vendredi": [{t: "2ct Pause",   r: "1x5", p: 65}, {t: "2ct Pause",   r: "1x5", p: 70}, {t: "2ct Pause",   r: "1x5", p: 75}, {t: "Classique",    r: "1x7", p: 65}],
            "Samedi":   [{t: "Larsen Press",r: "1x7", p: 60}, {t: "Larsen Press",r: "2x7", p: 65}, {t: "Larsen Press",r: "1x7", p: 62}],
            "Dimanche": [{t: "Classique",   r: "1x1", p: 85}, {t: "Classique",   r: "1x1", p: 89}, {t: "Classique",   r: "1x1", p: 92}, {t: "Classique",    r: "1x7", p: 65}]
        },
        3: {
            "Jeudi":    [{t: "Classique",   r: "1x3", p: 82}, {t: "Classique",   r: "1x3", p: 84}, {t: "Classique",   r: "1x3", p: 87}, {t: "Large/Serrée", r: "1x8", p: 70}, {t: "Large/Serrée", r: "1x8", p: 67}],
            "Vendredi": [{t: "2ct Pause",   r: "1x5", p: 65}, {t: "2ct Pause",   r: "1x5", p: 70}, {t: "2ct Pause",   r: "1x5", p: 75}, {t: "Classique",    r: "1x7", p: 65}],
            "Samedi":   [{t: "Larsen Press",r: "1x7", p: 60}, {t: "Larsen Press",r: "2x7", p: 65}, {t: "Larsen Press",r: "1x7", p: 62}],

    // ========================================================================
    //  CALCUL DES POIDS / ROUND
    // ========================================================================
    // Arrondi au multiple supérieur
    function roundToStep(value, step) {
        return Math.ceil(value / step) * step;
    }

    // Pour les objectifs évolutifs (bench cycle +2,5 par bloc de 5 semaines)
    function getCycleBonus(startDate, targetDate) {
        const diffDays = Math.floor((targetDate - startDate) / (1000*60*60*24));
        const weekIndex = Math.floor(diffDays / 7);
        return Math.floor(weekIndex / 5) * 2.5;
    }

    // ========================================================================
    //  ASSEMBLAGE DES EXERCICES DU JOUR
    // ========================================================================
    function buildDaySessions(weekInCycle, dayName, isCamille, cycleBonus) {
        const blocks = [];

        // Bench goal qui sert de référence pour tout le verso
        const benchGoal = (isCamille ? CAMILLE_GOAL : BASE_GOAL) + cycleBonus;

        // Ratio dynamique Camille : recalculé à chaque cycle pour rester cohérent
        // Cycle 0 : 37.5/120 = 0.3125 ; Cycle 1 : 40/122.5 = 0.3265 ; etc.
        const camilleRatio = isCamille
            ? (CAMILLE_GOAL + cycleBonus) / (BASE_GOAL + cycleBonus)
            : 1;

        // 1) BENCH
        const benchDay = benchProgram[weekInCycle][dayName];
        if (benchDay) {
            const goal = benchGoal;
            blocks.push({
                type: "bench",
                icon: "🏋️",
                title: "Bench Press",
                subtitle: `Objectif ${roundToStep(goal, 2.5)} kg`,
                sets: benchDay.map(w => ({
                    name: w.t,
                    reps: `${w.r} à ${w.p}%`,
                    weight: roundToStep(goal * w.p / 100, 2.5)
                }))
            });
        }

        // 2) SQUAT — 1RM ref évolue avec le cycle, ratio Camille appliqué
        const squatDay = squatProgram[weekInCycle][dayName];
        if (squatDay) {
            const goal = (MAX_REF.squat + cycleBonus) * camilleRatio;
            blocks.push({
                type: "squat",
                icon: "🦵",
                title: "Squat",
                subtitle: `Max ${roundToStep(goal, 2.5)} kg`,
                sets: squatDay.map(w => ({
                    name: w.t,
                    reps: `${w.r} à ${w.p}%`,
                    weight: roundToStep(goal * w.p / 100, 2.5)
                }))
            });
        }

        // 3) DM — règle CSV : "+2,5 kg tous les 2 blocs" (progression 2x plus lente)
        const dmDay = dmProgram[weekInCycle][dayName];
        if (dmDay) {
            // Bonus DM = floor(cycleIndex / 2) * 2.5 — cycleIndex récupéré via cycleBonus / 2.5
            const cycleIndex = cycleBonus / 2.5;
            const dmBonus = Math.floor(cycleIndex / 2) * 2.5;
            const goal = (MAX_REF.dm + dmBonus) * camilleRatio;
            blocks.push({
                type: "dm",
                icon: "💪",
                title: "Développé Militaire",
                subtitle: `Max ${roundToStep(goal, 2.5)} kg`,
                sets: dmDay.map(w => ({
                    name: w.t,
                    reps: `${w.r} à ${w.p}%`,
                    weight: roundToStep(goal * w.p / 100, 2.5)
                }))
            });
        }

        // 4) ROWING — règle CSV : "+2 kg sur le 3x8 tous les 2 blocs"
        const rowDay = rowingProgram[weekInCycle][dayName];
        if (rowDay) {
            const cycleIndex = cycleBonus / 2.5;
            const rowBonus = Math.floor(cycleIndex / 2) * 2;
            blocks.push({
                type: "rowing",
                icon: "🚣",
                title: "Rowing",
                subtitle: `Dos — tirage`,
                sets: rowDay.map(w => ({
                    name: w.t,
                    reps: w.r,
                    weight: roundToStep((w.kg + rowBonus) * camilleRatio, 2)
                }))
            });
        }

        // 5) TRACTION — règle CSV : "+1,25 kg de lest/bloc"
        const trac = tracProgram[weekInCycle];
        if (trac.days.includes(dayName)) {
            const cycleIndex = cycleBonus / 2.5;
            // Pour Camille : pas de lest jusqu'à ce qu'elle progresse — on commence à charger après quelques cycles
            if (isCamille) {
                // Camille : poids du corps les 4 premiers cycles, puis lest progressif (rythme adapté)
                const camilleLest = cycleIndex >= 4 ? Math.floor((cycleIndex - 3) / 2) * 1.25 : 0;
                blocks.push({
                    type: "trac",
                    icon: "🤸",
                    title: "Tractions",
                    subtitle: weekInCycle === 5 ? "Pyramide 1>3>1" : "Pyramide 1>5>1",
                    single: {
                        label: camilleLest > 0 ? "Lest" : "Poids du corps",
                        value: camilleLest > 0 ? `${camilleLest} kg` : "0 kg"
                    }
                });
            } else {
                // Recto : lest de base + 1,25 kg par cycle (S5 reste 0 kg en deload)
                const lest = (weekInCycle === 5) ? 0 : trac.lest + (cycleIndex * 1.25);
                blocks.push({
                    type: "trac",
                    icon: "🤸",
                    title: "Tractions",
                    subtitle: trac.r,
                    single: {
                        label: "Lest",
                        value: `${lest} kg`
                    }
                });
            }
        }

        // 6) COURSE — règle CSV : "+5 km sur la sortie longue tous les 2 blocs"
        const km = (isCamille ? courseProgramCamille : courseProgram)[weekInCycle][dayName];
        if (km != null) {
            const cycleIndex = cycleBonus / 2.5;
            // Bonus appliqué uniquement à la sortie longue (≥ 8 km), pas au déload
            const isLongRun = km >= 8;
            const courseBonus = (isLongRun && weekInCycle !== 5) ? Math.floor(cycleIndex / 2) * (isCamille ? 2 : 5) : 0;
            const finalKm = km + courseBonus;
            blocks.push({
                type: "course",
                icon: "🏃",
                title: "Course",
                subtitle: "Allure 6:00 /km",
                single: {
                    label: finalKm >= 10 ? "Sortie longue" : "Footing",
                    value: `${finalKm} km`
                }
            });
        }

        // 7) ABDOS
        if (abdosDays.includes(dayName)) {
            blocks.push({
                type: "abdos",
                icon: "🔥",
                title: "Abdos",
                subtitle: "Gainage + crunchs",
                single: {
                    label: "Programme",
                    value: "Oui"
                }
            });
        }

        return blocks;
    }

    // ========================================================================
    //  DONNÉES DU JOUR
    // ========================================================================
    function getWorkoutData(targetDate, isCamille = false) {
        // Calcul du nombre de jours entre START_DATE et targetDate
        // Utilise UTC pour éviter les sauts de DST (passage heure été/hiver = 23h ou 25h)
        const startUTC  = Date.UTC(START_DATE.getFullYear(), START_DATE.getMonth(), START_DATE.getDate());
        const targetUTC = Date.UTC(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
        const diffDays = Math.round((targetUTC - startUTC) / (1000 * 60 * 60 * 24));

        if (diffDays < 0) return null;

        const currentWeekIndex = Math.floor(diffDays / 7);
        const cycleIndex = Math.floor(currentWeekIndex / 5);
        const weekInCycle = (currentWeekIndex % 5) + 1;

        // +2,5 kg par cycle pour TOUT LE MONDE (recto et verso) — règle CSV "Bench/Squat +2,5 kg/bloc"
        const cycleBonus = cycleIndex * 2.5;
        const benchGoal  = (isCamille ? CAMILLE_GOAL : BASE_GOAL) + cycleBonus;

        // Le JOUR de séance est décalé de DAY_SHIFT (jeudi→mardi…) ; la semaine et
        // le deload restent calculés sur la date réelle (donc inchangés).
        const shifted = new Date(targetDate);
        shifted.setDate(shifted.getDate() + DAY_SHIFT);
        const dayName = DAYS_FR[shifted.getDay()];
        const blocks = buildDaySessions(weekInCycle, dayName, isCamille, cycleBonus);

        return {
            week: weekInCycle,
            benchGoal,
            dayName,
            blocks,
            isDeload: weekInCycle === 5
        };
    }

    function findNextSession(startDate, isCamille) {
        let next = new Date(startDate);
        for (let i = 1; i <= 7; i++) {
            next.setDate(next.getDate() + 1);
            const data = getWorkoutData(next, isCamille);
            if (data && data.blocks.length > 0) {
                return next.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
            }
        }
        return null;
    }

    // ========================================================================

    // ========================================================================
    function buildBlockHTML(block) {
        // Variante single-value (course, abdos, traction simple)
        if (block.single) {
            return `

                    <div class="ex-header">
                        <div class="ex-icon ${block.type}">${block.icon}</div>
                        <div>

                        </div>
                    </div>
                    <div class="single-line">

                        <span class="value">${block.single.value}</span>
                    </div>
                </div>
            `;
        }

        // Variante sets multiples (bench, squat, DM, rowing)
        const rowsHtml = block.sets.map(s => `
            <div class="set-row">
                <div class="set-info">
                    <span class="set-name">${s.name}</span>
                    <span class="set-reps">${s.reps}</span>
                </div>
                <div class="set-weight">${s.weight} kg</div>
            </div>
        `).join('');

        return `
            <div class="ex-block type-${block.type}">
                <div class="ex-header">
                    <div class="ex-icon ${block.type}">${block.icon}</div>
                    <div>
                        <div class="ex-title">${block.title}</div>
                        <div class="ex-subtitle">${block.subtitle}</div>
                    </div>
                </div>
                <div class="set-list">${rowsHtml}</div>
            </div>
        `;
    }

    function buildCardHTML(data, isCamille) {
        const goalDisplay = isCamille
            ? `${data.benchGoal} kg`
            : `${data.benchGoal} kg`;

        const personaLabel = isCamille ? 'Programme Camille' : 'Objectif du cycle';

        // Jour de repos complet
        if (!data.blocks || data.blocks.length === 0) {
            const next = findNextSession(selectedDate, isCamille);
            return `
                ${isCamille ? '<div class="persona-badge">👩 Camille</div>' : ''}
                <div class="rest-state">
                    <span class="rest-icon">🧘‍♂️</span>
                    <div class="rest-title">Repos</div>
                    <div class="rest-sub">Récupération active</div>
                    ${next ? `<div class="next-session">Prochaine séance<br>${next}</div>` : ''}
                </div>
            `;
        }

        const deloadChip = data.isDeload ? '<span class="deload-chip">Deload</span>' : '';

        let html = `
            <div class="goal-info">
                <div class="goal-text">
                    ${isCamille ? '<div class="persona-badge">👩 Camille</div>' : ''}
                    <div>Semaine <strong>${data.week}</strong>${deloadChip}</div>
                    <div style="margin-top:2px;">${personaLabel}</div>
                </div>
                <div class="goal-val">${goalDisplay}</div>
            </div>
            <div class="workout-list">
                ${data.blocks.map(buildBlockHTML).join('')}
            </div>
        `;
        return html;
    }

    // ========================================================================
    //  HELPERS DATE
    // ========================================================================
    function startOfDay(d) {
        const x = new Date(d);
        x.setHours(0, 0, 0, 0);
        return x;
    }

    function isSameDay(a, b) {
        return a.getFullYear() === b.getFullYear()
            && a.getMonth() === b.getMonth()
            && a.getDate() === b.getDate();
    }

    // Bornes navigables : mêmes limites que le calendrier
    // (1er jour du mois -1, dernier jour du mois +12)
    function getDateBounds() {
        const today = startOfDay(new Date());
        const minDate = new Date(today.getFullYear(), today.getMonth() - 1, 1);
        const maxDate = new Date(today.getFullYear(), today.getMonth() + 13, 0);
        return { minDate, maxDate };
    }

    // ========================================================================
    //  ÉTAT GLOBAL
    // ========================================================================
    let selectedDate = startOfDay(new Date()); // Date affichée dans la carte

    // ========================================================================
    //  RENDU CARTE PRINCIPALE
    // ========================================================================
    function render() {
        const dataRecto = getWorkoutData(selectedDate, false);
        const dataVerso = getWorkoutData(selectedDate, true);

        const app     = document.getElementById('app');
        const appBack = document.getElementById('appBack');
        const dayLabel = document.getElementById('day-label');
        const today    = startOfDay(new Date());

        // Label : "Aujourd'hui" si c'est aujourd'hui, sinon nom du jour
        if (isSameDay(selectedDate, today)) {
            dayLabel.textContent = "Aujourd'hui";
        } else {
            const diffDays = Math.round((selectedDate - today) / (1000*60*60*24));
            if (diffDays === 1)       dayLabel.textContent = "Demain";
            else if (diffDays === -1) dayLabel.textContent = "Hier";
            else                      dayLabel.textContent = selectedDate.toLocaleDateString('fr-FR', { weekday: 'long' });
        }

        document.getElementById('display-date').textContent = selectedDate.toLocaleDateString('fr-FR', {
            day: 'numeric', month: 'long'
        });

        app.innerHTML     = buildCardHTML(dataRecto, false);
        appBack.innerHTML = buildCardHTML(dataVerso, true);
    }

    const TYPE_COLORS = {

    const TYPE_ORDER = ['bench', 'dm', 'squat', 'rowing', 'trac', 'abdos', 'course'];

    // Regroupe les exercices d'un jour en couleurs uniques (rowing + trac = 1 seule pastille verte)
    function getDayColorKeys(types) {
        const groups = {
            push:   ['bench', 'dm'],          // Rouge & Rose mais on les garde distincts
            back:   ['rowing', 'trac'],       // Tous les deux verts → 1 seule pastille
        };
        // On ne fusionne que les types qui partagent EXACTEMENT la même couleur
        const seenColors = new Set();
        const keys = [];
        TYPE_ORDER.forEach(t => {
            if (!types.includes(t)) return;
            const c = TYPE_COLORS[t];
            if (seenColors.has(c)) return;
            seenColors.add(c);
            keys.push(t);
        });
        return keys;
    }

    // ========================================================================
    //  CONSTRUCTION DU CALENDRIER
    // ========================================================================
    const MONTHS_FR_SHORT = ['Janv.','Févr.','Mars','Avr.','Mai','Juin','Juil.','Août','Sept.','Oct.','Nov.','Déc.'];
    const WEEKDAYS_FR_SHORT = ['L','M','M','J','V','S','D']; // Semaine commence lundi

    function buildCalendar() {
        const today = startOfDay(new Date());
        const { minDate, maxDate } = getDateBounds();

        // Générer la liste des mois à afficher (du minDate au maxDate)
        const months = [];
        let cursor = new Date(minDate);
        while (cursor <= maxDate) {
            months.push({
                year: cursor.getFullYear(),
                month: cursor.getMonth()
            });
            cursor.setMonth(cursor.getMonth() + 1);
        }

        // Générer les pills de mois (en haut)
        const monthSelector = document.getElementById('monthSelector');
        monthSelector.innerHTML = months.map((m, i) => {
            const isCurrent = (m.year === today.getFullYear() && m.month === today.getMonth());
            const label = MONTHS_FR_SHORT[m.month];
            const yearTag = (m.year !== today.getFullYear()) ? ` ${String(m.year).slice(2)}` : '';
            return `<div class="month-pill ${isCurrent ? 'active' : ''}" data-month-index="${i}">${label}${yearTag}</div>`;
        }).join('');

        // Générer les blocs mensuels (scrollables)
        const monthsScroll = document.getElementById('monthsScroll');
        monthsScroll.innerHTML = months.map((m, i) => buildMonthBlockHTML(m, i, today, minDate, maxDate)).join('');

        // Listeners : pill click → scroll vers le mois
        monthSelector.querySelectorAll('.month-pill').forEach(pill => {
            pill.addEventListener('click', () => {
                const idx = parseInt(pill.dataset.monthIndex);
                const block = monthsScroll.querySelector(`.month-block[data-month-index="${idx}"]`);
                if (block) {
                    monthsScroll.scrollTo({
                        top: block.offsetTop - 4,
                        behavior: 'smooth'
                    });
                }
            });
        });

        // Listeners : day click → sélectionner et fermer
        monthsScroll.querySelectorAll('.day-cell:not(.empty):not(.out-of-range)').forEach(cell => {
            cell.addEventListener('click', () => {
                const dateStr = cell.dataset.date;
                if (dateStr) {
                    // Parser en heure locale (et non UTC) pour éviter tout décalage
                    const [y, m, d] = dateStr.split('-').map(Number);
                    selectedDate = new Date(y, m - 1, d);
                    closeCalendar();
                    render();
                }
            });
        });

        // Sync de la pill active selon le scroll
        let scrollTimeout;
        monthsScroll.addEventListener('scroll', () => {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                const blocks = monthsScroll.querySelectorAll('.month-block');
                let activeIdx = 0;
                const scrollMid = monthsScroll.scrollTop + monthsScroll.clientHeight / 3;
                blocks.forEach(b => {
                    if (b.offsetTop <= scrollMid) {
                        activeIdx = parseInt(b.dataset.monthIndex);
                    }
                });
                monthSelector.querySelectorAll('.month-pill').forEach(p => {
                    p.classList.toggle('active', parseInt(p.dataset.monthIndex) === activeIdx);
                });
                // Centrer la pill active
                const activePill = monthSelector.querySelector('.month-pill.active');
                if (activePill) {
                    const pillRect = activePill.getBoundingClientRect();
                    const selRect = monthSelector.getBoundingClientRect();
                    if (pillRect.left < selRect.left + 20 || pillRect.right > selRect.right - 20) {
                        activePill.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                    }
                }
            }, 80);
        });
    }

    function buildMonthBlockHTML(monthInfo, idx, today, minDate, maxDate) {
        const { year, month } = monthInfo;
        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0);
        const numDays = lastDay.getDate();

        // Lundi = 0 dans notre grille (offset)
        const firstWeekday = (firstDay.getDay() + 6) % 7;

        let cells = '';
        // Cellules vides avant le 1er
        for (let i = 0; i < firstWeekday; i++) {
            cells += `<div class="day-cell empty"></div>`;
        }

        // Jours du mois
        for (let d = 1; d <= numDays; d++) {
            const date = new Date(year, month, d);
            const isToday = isSameDay(date, today);
            const isSelected = isSameDay(date, selectedDate);
            const isOutOfRange = date < minDate || date > maxDate;
            const isPast = date < today && !isToday;

            // Récupère les exercices du jour pour la pastille (recto uniquement)
            const data = getWorkoutData(date, false);
            const types = (data && data.blocks) ? data.blocks.map(b => b.type) : [];
            const isRest = types.length === 0;
            const isDeload = data && data.isDeload;

            // Construire les pastilles (1 par couleur unique du jour)
            const colorKeys = getDayColorKeys(types);
            const dotsHTML = colorKeys.map(t =>
                `<div class="day-dot dot-${t}" style="background:${TYPE_COLORS[t]}"></div>`
            ).join('');

            const classes = [
                'day-cell',
                isToday ? 'today' : '',
                isSelected ? 'selected' : '',
                isOutOfRange ? 'out-of-range' : '',
                isRest ? 'rest' : '',
                isPast ? 'past' : '',
                isDeload ? 'deload' : ''
            ].filter(Boolean).join(' ');

            const dateISO = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

            cells += `
                <div class="${classes}" data-date="${dateISO}">
                    <div class="day-num">${d}</div>
                    <div class="day-dots">${dotsHTML}</div>
                </div>
            `;
        }

        const monthName = firstDay.toLocaleDateString('fr-FR', { month: 'long' });
        const yearTag = (year !== today.getFullYear()) ? `<span class="year-tag">${year}</span>` : '';

        const weekdayHeader = WEEKDAYS_FR_SHORT.map(d => `<div class="weekday-cell">${d}</div>`).join('');

        return `
            <div class="month-block" data-month-index="${idx}">
                <div class="month-title">${monthName}${yearTag}</div>
                <div class="weekday-row">${weekdayHeader}</div>
                <div class="day-grid">${cells}</div>
            </div>
        `;
    }

    // ========================================================================
    //  TOGGLE CALENDRIER
    // ========================================================================
    const stage = document.getElementById('stage');
    const headerDate = document.getElementById('headerDate');
    const flipHint = document.getElementById('flipHint');

    function openCalendar() {
        buildCalendar();
        stage.classList.add('cal-mode');
        headerDate.classList.add('cal-open');
        if (flipHint) {
            flipHint.style.opacity = '0';
            flipHint.style.pointerEvents = 'none';
        }

        // Scroll vers le mois courant
        requestAnimationFrame(() => {
            const monthsScroll = document.getElementById('monthsScroll');
            const todayMonthIdx = 1; // Index 1 = mois courant (puisque minDate = mois -1)
            const block = monthsScroll.querySelector(`.month-block[data-month-index="${todayMonthIdx}"]`);
            if (block) monthsScroll.scrollTop = block.offsetTop - 4;
        });
    }

    function closeCalendar() {
        stage.classList.remove('cal-mode');
        headerDate.classList.remove('cal-open');
        if (flipHint) {
            flipHint.style.opacity = '';
            flipHint.style.pointerEvents = '';
        }
    }

    function toggleCalendar() {
        if (stage.classList.contains('cal-mode')) closeCalendar();
        else openCalendar();
    }

    headerDate.addEventListener('click', toggleCalendar);

    // ========================================================================
    //  INIT
    // ========================================================================
    render();

    // Flip au clic (carte uniquement, pas en mode calendrier)
    const flipContainer = document.getElementById('flipContainer');
    flipContainer.addEventListener('click', () => {
        if (stage.classList.contains('cal-mode')) return;
        if (flipContainer.dataset.swiped === '1') {
            // Le clic provient de la fin d'un swipe → on annule le flip
            flipContainer.dataset.swiped = '';
            return;
        }
        flipContainer.classList.toggle('flipped');
    });

    // ========================================================================
    //  SWIPE GAUCHE/DROITE → JOUR PRÉCÉDENT/SUIVANT
    //  Mêmes bornes que le calendrier (getDateBounds)
    // ========================================================================
    (function setupSwipe() {
        let startX = 0, startY = 0;
        let currentX = 0;
        let dragging = false;
        let decided = false;       // Direction (horizontal vs vertical) verrouillée
        let isHorizontal = false;
        const SWIPE_THRESHOLD = 60;        // px : distance min pour valider un swipe
        const VELOCITY_THRESHOLD = 0.4;    // px/ms : vitesse min pour valider un flick
        let startTime = 0;

        function canGoPrev() {
            const { minDate } = getDateBounds();
            const prev = new Date(selectedDate);
            prev.setDate(prev.getDate() - 1);
            return prev >= minDate;
        }

        function canGoNext() {
            const { maxDate } = getDateBounds();
            const next = new Date(selectedDate);
            next.setDate(next.getDate() + 1);
            return next <= maxDate;
        }

        function navigateDay(direction) {
            // direction: -1 = jour précédent, +1 = jour suivant
            if (direction === -1 && !canGoPrev()) return false;
            if (direction === +1 && !canGoNext()) return false;

            const newDate = new Date(selectedDate);
            newDate.setDate(newDate.getDate() + direction);
            selectedDate = newDate;

            // Animation : la carte sort, on rerend, puis elle entre depuis l'autre côté
            const outClass = direction === +1 ? 'swipe-out-left' : 'swipe-out-right';
            const inClass  = direction === +1 ? 'swipe-in-left'  : 'swipe-in-right';

            flipContainer.classList.add('swipe-anim', outClass);

            setTimeout(() => {
                render();
                // Replace : on enlève la sortie et on met l'entrée (sans animation)
                flipContainer.classList.remove('swipe-anim', outClass);
                flipContainer.classList.add(inClass);

                // Frame suivante : on déclenche l'animation d'entrée
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        flipContainer.classList.add('swipe-anim');
                        flipContainer.classList.remove(inClass);

                        setTimeout(() => {
                            flipContainer.classList.remove('swipe-anim');
                        }, 300);
                    });
                });
            }, 280);

            return true;
        }

        // Petit feedback : si on tente d'aller au-delà des bornes, on fait un rebond
        function bounceBack(direction) {
            // direction: -1 = utilisateur a swipé vers la droite (jour précédent) hors limite
            //            +1 = swipé vers la gauche (jour suivant) hors limite
            const offset = direction === +1 ? -30 : 30;
            flipContainer.style.transition = 'transform 0.15s ease-out';
            flipContainer.style.transform = `translateX(${offset}px)`;
            setTimeout(() => {
                flipContainer.style.transition = 'transform 0.25s cubic-bezier(0.33, 1, 0.68, 1)';
                flipContainer.style.transform = '';
                setTimeout(() => {
                    flipContainer.style.transition = '';
                }, 250);
            }, 150);
        }

        function onStart(e) {
            if (stage.classList.contains('cal-mode')) return;
            const t = e.touches ? e.touches[0] : e;
            startX = t.clientX;
            startY = t.clientY;
            currentX = 0;
            dragging = true;
            decided = false;
            isHorizontal = false;
            startTime = Date.now();
        }

        function onMove(e) {
            if (!dragging) return;
            if (stage.classList.contains('cal-mode')) return;
            const t = e.touches ? e.touches[0] : e;
            const dx = t.clientX - startX;
            const dy = t.clientY - startY;

            // Décide la direction au premier mouvement significatif
            if (!decided) {
                if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
                    isHorizontal = Math.abs(dx) > Math.abs(dy);
                    decided = true;
                }
            }

            if (decided && isHorizontal) {
                if (e.cancelable) e.preventDefault(); // bloque le scroll vertical
                currentX = dx;
                // Suivi visuel du doigt avec une légère résistance aux bornes
                let translate = dx;
                if ((dx < 0 && !canGoNext()) || (dx > 0 && !canGoPrev())) {
                    translate = dx * 0.3; // résistance "rubber band"
                }
                flipContainer.style.transform = `translateX(${translate}px)`;
                flipContainer.style.transition = 'none';
            }
        }

        function onEnd() {
            if (!dragging) return;
            dragging = false;

            if (!decided || !isHorizontal) {
                flipContainer.style.transform = '';
                flipContainer.style.transition = '';
                return;
            }

            const dx = currentX;
            const dt = Math.max(1, Date.now() - startTime);
            const velocity = Math.abs(dx) / dt;

            // Reset des styles inline avant l'animation contrôlée par classes
            flipContainer.style.transform = '';
            flipContainer.style.transition = '';

            const direction = dx < 0 ? +1 : -1; // gauche = jour suivant, droite = jour précédent
            const passedThreshold = Math.abs(dx) > SWIPE_THRESHOLD || velocity > VELOCITY_THRESHOLD;

            if (passedThreshold) {
                const success = navigateDay(direction);
                if (success) {
                    // Marquer pour empêcher le clic résiduel de déclencher le flip
                    flipContainer.dataset.swiped = '1';
                    setTimeout(() => { flipContainer.dataset.swiped = ''; }, 400);
                } else {
                    bounceBack(direction);
                }
            }
        }

        // Touch
        flipContainer.addEventListener('touchstart', onStart, { passive: true });
        flipContainer.addEventListener('touchmove', onMove, { passive: false });
        flipContainer.addEventListener('touchend', onEnd);
        flipContainer.addEventListener('touchcancel', onEnd);

        // Souris (desktop)
        flipContainer.addEventListener('mousedown', onStart);
        window.addEventListener('mousemove', (e) => { if (dragging) onMove(e); });
        window.addEventListener('mouseup', onEnd);
    })();
</script>
